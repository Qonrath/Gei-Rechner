<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Gei-Rechner dev</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div id="splash-screen">
  <div class="splash-text">
    <span class="word" style="animation-delay: 0s;">GEI</span>
    <span class="word" style="animation-delay: 0.2s;">GEI</span><br>
    <span class="word" style="animation-delay: 0.4s;">WIR</span>
    <span class="word" style="animation-delay: 0.6s;">FAHRN</span>
    <span class="word" style="animation-delay: 1s;">INS</span>
    <span class="word" style="animation-delay: 1.2s;">GEI</span>
  </div>
</div>

<div id="overlay" onclick="closeOverlay()">
  <div id="overlay-box" onclick="event.stopPropagation()">
    <h2 id="overlay-titel">Auswahl</h2>
    <div id="overlay-content"></div> 
    <button onclick="closeOverlay()" class="btn-back" style="margin-top:20px;">Abbrechen</button>
  </div>
</div>

<div class="app-container">
  <div class="header">
    <div class="header-info">
      <div id="live-date">00.00.0000</div>
      <div id="live-time">00:00:00</div>
    </div>
    <div id="display-fahrer">LÄDT...</div>
    <div class="header-tools">
      <button class="icon-btn" onclick="navigation('main-view')">🛒</button>
      <button class="icon-btn" onclick="navigation('stats-view')">Σ</button>
      <button class="icon-btn" onclick="navigation('settings-view')">⚙️</button>
    </div>
  </div>
  
  <div id="main-view" class="view">
    <div id="rechnungs-betrag">0.00 €</div>
    <div class="schnell-tasten" id="produkt-container"></div>
    <div class="action-area">
      <button id="btn-passend" onclick="verbuchen(0)">Σ: 0.00</button>
      <button id="btn-auf50">½→</button>
      <button id="btn-aufEuro">€→</button>
      <button id="btn-clear" onclick="resetAktuellerKunde()">C</button>
    </div>
    <div id="ticker-container"><ul id="ticker-liste"></ul></div>
    <div id="umsatz-anzeige">
      Ware: <span id="display-ware">0.00</span>€ | Tip: <span id="display-trinkgeld">0.00</span>€ | Σ: <span id="display-gesamt">0.00</span>€
    </div>
  </div>

  <div id="stats-view" class="view">
    <h2 class="view-title">Tagesbericht Vorschau</h2>
    <div id="bericht-vorschau-container"><pre id="bericht-live-text"></pre></div>
    <div class="optionen-grid" style="margin-top: 15px;">
      <button class="btn-gold" onclick="kopiereTagesbericht()">📋 Kopieren</button>
      <button class="btn-danger" onclick="neuerTagStarten()">📅 Tag Reset</button>
    </div>
  </div>

  <div id="settings-view" class="view">
    <h2 class="view-title">Fahrer</h2>
    <div class="fahrer-settings">
      <input type="text" id="input-fahrer" placeholder="Name..." oninput="markAsDirty()">
    </div>
    <h2 class="view-title">Produkte & Preise</h2>
    <div id="preis-editor"></div>
    <button onclick="produkteSpeichern()" class="btn-save">💾 Speichern</button>
    <button onclick="totalerReset()" class="btn-mutter">⚠️ WERKSEINSTELLUNG</button>
  </div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
